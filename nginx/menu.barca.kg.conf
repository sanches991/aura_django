# =============================================================================
# AURA — Nginx Reverse Proxy Configuration
#
# Контекст: на сервере уже запущен проект EL-CRM, который слушает порты 80/443.
# Решение: добавить новые server-блоки в СУЩЕСТВУЮЩИЙ Nginx EL-CRM-проекта
# (или в /etc/nginx/sites-available/ хостового Nginx).
#
# Как разделить трафик:
#   • backend.elcrm.kg  → EL-CRM (уже работает, не трогаем)
#   • menu.barca.kg     → Aura (новый проект, порт 127.0.0.1:8001)
#
# Схема:
#   Internet → (80/443) → Host Nginx → [SNI/server_name]
#                                       ├── backend.elcrm.kg → elcrm upstream
#                                       └── menu.barca.kg   → aura upstream (localhost:8001)
#
# Где разместить этот файл:
#   /etc/nginx/sites-available/menu.barca.kg.conf
# Активировать:
#   sudo ln -s /etc/nginx/sites-available/menu.barca.kg.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

upstream aura_gunicorn {
    # aura-web контейнер слушает на 127.0.0.1:8001 (docker-compose.yml → ports)
    server 127.0.0.1:8001 fail_timeout=10s max_fails=3;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name menu.barca.kg www.menu.barca.kg;

    # For Certbot ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — основной блок ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name menu.barca.kg www.menu.barca.kg;

    # SSL-сертификаты (Let's Encrypt через Certbot)
    # Получить: sudo certbot --nginx -d menu.barca.kg -d www.menu.barca.kg
    ssl_certificate     /etc/letsencrypt/live/menu.barca.kg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/menu.barca.kg/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Общие настройки ─────────────────────────────────────────────────────
    client_max_body_size 20m;

    # Gzip для text-контента (Brotli отдаёт WhiteNoise)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ─── Статические файлы (обходим Django, отдаём напрямую) ─────────────────
    # Путь должен совпадать с STATIC_ROOT внутри контейнера, смонтированного
    # в volume aura-static-files. Если Nginx хостовый — смонтируйте том:
    #   docker cp aura-web:/app/staticfiles /srv/aura/staticfiles
    # или настройте bind mount.
    location /static/ {
        alias /srv/aura/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /srv/aura/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Проксирование на Gunicorn ────────────────────────────────────────────
    location / {
        proxy_pass         http://aura_gunicorn;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Буферизация ответов
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ─── Логи ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/aura_access.log;
    error_log  /var/log/nginx/aura_error.log warn;
}

# =============================================================================
# СПРАВОЧНО: Как сосуществуют два проекта на одном сервере
# =============================================================================
# Оба проекта занимают порты 80/443 через ОДИН хостовый Nginx:
#
#  /etc/nginx/sites-enabled/
#  ├── elcrm.conf       ← server_name backend.elcrm.kg → proxy_pass http://127.0.0.1:8000
#  └── aura.conf        ← server_name menu.barca.kg    → proxy_pass http://127.0.0.1:8001
#
# Docker Compose:
#  EL-CRM: порт 127.0.0.1:8000:8000  (уже настроен)
#  AURA:   порт 127.0.0.1:8001:8000  (наш новый docker-compose.yml)
#
# Nginx различает проекты по заголовку Host (SNI для HTTPS),
# порты 80/443 слушает один процесс Nginx — конфликта нет.
# =============================================================================
